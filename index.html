<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Streaming | Panel Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b121f; --card: #161b2c; --border: #1e293b; --blue: #2563eb; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; font-size: 13px; }
        .sidebar-card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; }
        .input-dark { background: #0f172a; border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.6rem; width: 100%; color: white; outline: none; }
        .platform-btn { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 10px; font-weight: 800; color: #94a3b8; }
        .platform-btn.active { background: var(--blue); border-color: #60a5fa; color: white; transform: scale(1.05); }
        .form-block { background: rgba(30, 41, 59, 0.5); border-left: 4px solid var(--blue); padding: 12px; margin-top: 8px; border-radius: 0 8px 8px 0; }
        .action-btn { width: 32px; height: 32px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: white; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-4">
            <div class="sidebar-card">
                <h2 class="text-blue-400 font-black text-xs mb-5 uppercase tracking-widest">Panel de Ventas Combo</h2>
                
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="c_nombre" type="text" placeholder="CLIENTE" class="input-dark font-bold uppercase">
                        <input id="c_telefono" type="text" placeholder="WHATSAPP" class="input-dark">
                    </div>

                    <div class="grid grid-cols-3 gap-2" id="selectorApps"></div>

                    <div id="contenedorFormularios" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>

                    <div class="pt-4 border-t border-slate-800">
                        <input id="c_vence" type="date" class="input-dark mb-4 text-blue-400 font-bold">
                        <button onclick="guardarCombo()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl uppercase tracking-widest transition-all">
                            Guardar y Sincronizar Todo
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="sidebar-card !p-0 overflow-hidden">
                <div class="p-4 bg-white/5 border-b border-slate-800">
                    <input id="bus" onkeyup="renderTabla()" type="text" placeholder="Buscar cliente o servicio..." class="bg-black/40 border border-slate-700 rounded-lg px-4 py-2 text-xs w-full outline-none">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-black/40 text-[10px] uppercase text-slate-500 border-b border-slate-800">
                            <tr>
                                <th class="p-4">Cliente / Servicios</th>
                                <th class="p-4 text-center">Días</th>
                                <th class="p-4 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla" class="divide-y divide-slate-800/50"></tbody>
                    </table>
                </div>
                <div id="loader" class="p-10 text-center text-slate-600 animate-pulse font-bold">Conectando con la base de datos...</div>
            </div>
        </div>
    </div>

    <script>
        // PEGA TU URL AQUÍ
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        
        const APPS = ["NETFLIX", "MAX", "PRIME", "DISNEY+", "IPTV", "YOUTUBE", "SPOTIFY", "CANVA", "CAPCUT", "TELELATINO", "PARAMOUNT"];
        let seleccionadas = new Set();
        let datosGlobal = [];

        window.onload = () => {
            const selector = document.getElementById('selectorApps');
            selector.innerHTML = APPS.map(app => `<div onclick="toggleApp('${app}')" id="btn-${app}" class="platform-btn">${app}</div>`).join('');
            cargarDatos();
        };

        function toggleApp(app) {
            const btn = document.getElementById(`btn-${app}`);
            if (seleccionadas.has(app)) {
                seleccionadas.delete(app);
                btn.classList.remove('active');
                document.getElementById(`form-${app}`)?.remove();
            } else {
                seleccionadas.add(app);
                btn.classList.add('active');
                agregarCampos(app);
            }
        }

        function agregarCampos(app) {
            const div = document.createElement('div');
            div.id = `form-${app}`;
            div.className = 'form-block';
            div.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-black text-blue-400 uppercase">${app}</span>
                </div>
                <input type="text" placeholder="Correo" data-app="${app}" class="f-mail input-dark mb-1.5">
                <input type="text" placeholder="Clave" data-app="${app}" class="f-pass input-dark mb-1.5">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" placeholder="Perfil" data-app="${app}" class="f-perf input-dark">
                    <input type="text" placeholder="PIN" data-app="${app}" class="f-pin input-dark">
                </div>
            `;
            document.getElementById('contenedorFormularios').appendChild(div);
        }

        async function guardarCombo() {
            const btn = document.getElementById('btnGuardar');
            const mails = Array.from(document.querySelectorAll('.f-mail')).map(i => i.value || 'N/A').join(' | ');
            const claves = Array.from(document.querySelectorAll('.f-pass')).map(i => i.value || 'N/A').join(' | ');
            const perfiles = Array.from(document.querySelectorAll('.f-perf')).map(i => i.value || 'N/A').join(' | ');
            const pins = Array.from(document.querySelectorAll('.f-pin')).map(i => i.value || 'N/A').join(' | ');

            const data = {
                id: Date.now(),
                nombre: document.getElementById('c_nombre').value.toUpperCase(),
                telefono: document.getElementById('c_telefono').value,
                servicios: Array.from(seleccionadas).join(' + '),
                correos: mails,
                claves: claves,
                perfiles: perfiles,
                pins: pins,
                vencimiento: document.getElementById('c_vence').value
            };

            if(!data.nombre || seleccionadas.size === 0 || !data.vencimiento) return alert("Completa todos los campos");
            
            btn.innerHTML = "GUARDANDO..."; btn.disabled = true;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function cargarDatos() {
            try {
                const res = await fetch(API_URL);
                datosGlobal = await res.json();
                document.getElementById('loader').classList.add('hidden');
                renderTabla();
            } catch(e) { console.error("Error:", e); }
        }

        function renderTabla() {
            const tbody = document.getElementById('cuerpoTabla');
            const busq = document.getElementById('bus').value.toLowerCase();
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            let html = "";

            datosGlobal.forEach(c => {
                const [id, nom, tel, serv, , , mail, pass, perf, pin, vence] = c;
                if(!nom || (!nom.toLowerCase().includes(busq) && !serv.toLowerCase().includes(busq))) return;

                let fVence = new Date(vence);
                let diff = Math.ceil((fVence.getTime() - hoy.getTime()) / 86400000);
                
                // MENSAJE WHATSAPP
                let msg = `⭐ *PLANET STREAMING* ⭐\n\nHola *${nom}*, tus servicios:\n\n`;
                const s_list = serv.split(' + ');
                const m_list = mail.toString().split(' | ');
                const k_list = pass.toString().split(' | ');
                const p_list = perf.toString().split(' | ');
                const pin_list = pin.toString().split(' | ');

                s_list.forEach((s, i) => {
                    msg += `📺 *${s}*\n👤 *User:* ${m_list[i]}\n🔑 *Pass:* ${k_list[i]}\n👤 *Perfil:* ${p_list[i]}\n📌 *PIN:* ${pin_list[i]}\n\n`;
                });
                msg += `🗓️ *Vence:* ${fVence.toLocaleDateString()}`;

                const urlWA = `https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(msg)}`;

                html += `
                <tr class="hover:bg-white/5 transition-all text-[11px]">
                    <td class="p-4">
                        <div class="text-blue-400 font-bold">${nom}</div>
                        <div class="text-[9px] text-slate-500 font-mono">${serv}</div>
                    </td>
                    <td class="p-4 text-center">
                        <span class="font-bold ${diff > 3 ? 'text-emerald-400' : 'text-red-500'}">${diff} DÍAS</span>
                    </td>
                    <td class="p-4 text-center flex justify-center gap-2">
                        <a href="${urlWA}" target="_blank" class="action-btn bg-blue-600"><i class="fab fa-whatsapp"></i></a>
                        <button onclick="renovar('${id}')" class="action-btn bg-emerald-600"><i class="fas fa-sync"></i></button>
                        <button onclick="eliminar('${id}')" class="action-btn bg-red-600/20 text-red-500 border border-red-500/50"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        async function renovar(id) {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'RENEW', id: id }) });
            location.reload();
        }
        async function eliminar(id) {
            if(!confirm("¿Eliminar cliente?")) return;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) });
            location.reload();
        }
    </script>
</body>
</html>
