<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Planet | Sistema JINETH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; margin: 0; padding: 15px; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .tabla-scroll-container { overflow-x: auto; width: 100%; display: block; }
        table { min-width: 800px; width: 100%; border-collapse: collapse; }
    </style>
</head>
<body>
    <div class="max-w-[1400px] mx-auto">
        
        <header class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            <div class="glass p-3 rounded-2xl border-l-4 border-blue-500">
                <p class="text-[8px] text-blue-400 font-bold uppercase italic">Ventas Hoy</p>
                <p id="ventasBrutas" class="text-lg font-black">$0.00</p>
            </div>
            <div class="glass p-3 rounded-2xl border-l-4 border-red-500">
                <p class="text-[8px] text-red-400 font-bold uppercase italic">Inversión</p>
                <p id="egresosHoy" class="text-lg font-black">$0.00</p>
            </div>
            <div class="glass p-3 rounded-2xl border-l-4 border-emerald-500 text-emerald-400">
                <p class="text-[8px] font-bold uppercase italic">Caja Neta</p>
                <p id="cajaNeto" class="text-lg font-black">$0.00</p>
            </div>
            <div class="glass p-3 rounded-2xl border-l-4 border-purple-500 text-purple-400 text-right">
                <p class="text-[8px] font-bold uppercase italic">Balance Global</p>
                <p id="gananciaAnio" class="text-lg font-black">$0.00</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-4">
                <div class="glass p-6 rounded-3xl shadow-2xl">
                    <h2 class="text-[10px] font-black text-blue-400 uppercase mb-4 tracking-widest italic">Registrar Nueva Venta</h2>
                    <div class="space-y-3">
                        <input id="nombre" type="text" placeholder="NOMBRE DEL CLIENTE" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold uppercase outline-none focus:border-blue-500">
                        <input id="telefono" type="text" placeholder="TELÉFONO (Ej: 58412...)" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none focus:border-blue-500">
                        <select id="servicio" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold uppercase outline-none">
                            <option value="NETFLIX">Netflix</option>
                            <option value="PRIME VIDEO">Prime Video</option>
                            <option value="DISNEY+">Disney+</option>
                            <option value="MAX">Max</option>
                            <option value="FLUJO TV">Flujo TV</option>
                            <option value="YOUTUBE">YouTube</option>
                        </select>
                        <input id="correo" type="text" placeholder="USUARIO / CORREO" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <input id="clave" type="text" placeholder="CLAVE" class="bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none">
                            <input id="perfil" type="text" placeholder="PERFIL" class="bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-2 border-t border-white/5 pt-2">
                            <input id="costo" type="number" step="0.01" placeholder="COSTO $" class="bg-slate-900 border border-red-900/20 rounded-xl p-3 text-[11px] text-red-400 outline-none">
                            <input id="precio" type="number" step="0.01" placeholder="VENTA $" class="bg-slate-900 border border-emerald-900/20 rounded-xl p-3 text-[11px] text-emerald-400 font-bold outline-none">
                        </div>
                        <input id="vencimiento" type="date" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold text-white outline-none">
                        
                        <button onclick="registrarYEnviar()" id="btnAccion" class="w-full bg-blue-600 hover:bg-blue-500 font-black py-4 rounded-xl shadow-lg uppercase text-[10px] tracking-widest transition-all italic">
                            REGISTRAR Y ENVIAR AL CLIENTE
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="glass rounded-3xl overflow-hidden shadow-2xl">
                    <div class="p-4 bg-white/5 border-b border-white/5">
                        <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="🔍 Buscar por nombre..." class="w-full max-w-xs bg-slate-950 border border-slate-800 rounded-2xl px-4 py-2 text-[10px] outline-none">
                    </div>
                    <div class="tabla-scroll-container">
                        <table class="text-left text-[11px]">
                            <thead class="bg-slate-950/80 text-slate-500 uppercase text-[9px] font-black">
                                <tr>
                                    <th class="p-4">Cliente / Servicio</th>
                                    <th class="p-4 text-center">Inversión</th>
                                    <th class="p-4 text-center">Venta</th>
                                    <th class="p-4 text-right">Borrar</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoTabla" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        let clientesGlobal = [];

        async function cargarDatos() {
            try {
                const res = await fetch(API_URL);
                clientesGlobal = await res.json();
                renderizarTabla();
            } catch(e) { console.error("Error al cargar"); }
        }

        async function registrarYEnviar() {
            const btn = document.getElementById('btnAccion');
            const data = {
                id: Date.now(),
                nombre: document.getElementById('nombre').value.toUpperCase().trim(),
                telefono: document.getElementById('telefono').value.trim(),
                servicio: document.getElementById('servicio').value,
                usuario: document.getElementById('correo').value.trim(),
                clave: document.getElementById('clave').value.trim(),
                perfil: document.getElementById('perfil').value.trim() || "1",
                costo: parseFloat(document.getElementById('costo').value) || 0,
                precio: parseFloat(document.getElementById('precio').value) || 0,
                vencimiento: document.getElementById('vencimiento').value
            };

            if(!data.nombre || !data.telefono || !data.vencimiento) {
                alert("⚠️ Por favor rellena Nombre, Teléfono y Fecha.");
                return;
            }

            btn.innerText = "PROCESANDO..."; btn.disabled = true;

            // 1. Guardar en Google Sheets
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });

            // 2. Abrir WhatsApp con Formato JINETH
            const msg = `⭐ SERVICIOS ACTIVOS - JINETH ⭐\n------------------------------\n📺 SERVICIO: ${data.servicio}\n👤 Usuario: ${data.usuario}\n🔑 Clave: ${data.clave}\n👤 Perfil: ${data.perfil}\n📌 PIN: No\n🗓️ Vence: ${data.vencimiento}\n------------------------------\n\n⚠️ REGLAS IMPORTANTES:\n- No cambiar datos de la cuenta.\n- Usar solo el perfil asignado.\n\nGracias por tu compra en Planet Streaming 🍿`;
            
            const numLimpio = data.telefono.replace(/\D/g, '');
            window.open(`https://api.whatsapp.com/send?phone=${numLimpio}&text=${encodeURIComponent(msg)}`, '_blank');

            // Recargar para ver el nuevo registro
            location.reload();
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            let vHoy = 0, cHoy = 0, uTotal = 0;

            let html = "";
            clientesGlobal.forEach(c => {
                const fReg = new Date(parseInt(c[0]));
                const costoVal = parseFloat(c[4]) || 0; 
                const ventaVal = parseFloat(c[5]) || 0; 

                if(!isNaN(fReg.getTime())) {
                    const esHoy = fReg.toDateString() === hoy.toDateString();
                    if(esHoy) { vHoy += ventaVal; cHoy += costoVal; }
                    uTotal += (ventaVal - costoVal);
                }

                html += `<tr class="hover:bg-white/5">
                    <td class="p-4 font-bold text-blue-400 uppercase">${c[1]} <span class="text-slate-500 font-normal ml-2">${c[3]}</span></td>
                    <td class="p-4 text-center text-red-400/70 font-mono italic">$${costoVal.toFixed(2)}</td>
                    <td class="p-4 text-center text-emerald-400 font-black">$${ventaVal.toFixed(2)}</td>
                    <td class="p-4 text-right"><button onclick="eliminar('${c[0]}')" class="text-slate-800 hover:text-red-500 transition-all"><i class="fas fa-trash-alt"></i></button></td>
                </tr>`;
            });

            tabla.innerHTML = html;
            document.getElementById('ventasBrutas').innerText = `$${vHoy.toFixed(2)}`;
            document.getElementById('egresosHoy').innerText = `$${cHoy.toFixed(2)}`;
            document.getElementById('cajaNeto').innerText = `$${(vHoy - cHoy).toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${uTotal.toFixed(2)}`;
        }

        async function eliminar(id) { if(confirm("¿Eliminar registro?")) { await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) }); location.reload(); } }
        window.onload = cargarDatos;
    </script>
</body>
</html>
