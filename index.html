<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Streaming | Multi-Servicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b121f; --card: #161b2c; --border: #1e293b; --blue: #2563eb; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; font-size: 13px; }
        .sidebar-card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.2rem; }
        .input-dark { background: #0f172a; border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.6rem; width: 100%; color: white; outline: none; }
        .btn-service { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.4rem; font-size: 10px; color: #94a3b8; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-service.active { background: var(--blue); color: white; border-color: #60a5fa; transform: scale(1.05); }
        .status-pill { border-radius: 20px; padding: 4px 12px; font-weight: 800; font-size: 10px; border: 1px solid; display: inline-block; }
        .action-btn { border-radius: 6px; width: 32px; height: 32px; font-size: 11px; color: white; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-5">
        <!-- FORMULARIO -->
        <div class="lg:col-span-4 space-y-4">
            <div class="sidebar-card">
                <h3 class="text-blue-400 font-black mb-4 uppercase tracking-tighter">Panel de Ventas Combo</h3>
                
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="nombre" type="text" placeholder="CLIENTE" class="input-dark font-bold uppercase">
                        <input id="telefono" type="text" placeholder="WHATSAPP" class="input-dark">
                    </div>

                    <div class="p-3 bg-black/30 rounded-xl border border-slate-800">
                        <p class="text-[10px] text-slate-500 mb-2 font-bold">SELECCIONA PLATAFORMAS:</p>
                        <div class="grid grid-cols-3 gap-1" id="gridServicios"></div>
                    </div>

                    <div class="bg-blue-900/10 p-3 rounded-lg border border-blue-500/20">
                        <p class="text-[10px] text-blue-400 mb-2 font-bold">DATOS DEL SERVICIO ACTUAL:</p>
                        <input id="correo" type="text" placeholder="CORREO" class="input-dark mb-2">
                        <div class="grid grid-cols-2 gap-2">
                            <input id="clave" type="text" placeholder="CLAVE" class="input-dark">
                            <input id="perfil" type="text" placeholder="PERFIL/PIN" class="input-dark">
                        </div>
                        <button onclick="agregarAlCombo()" class="w-full mt-3 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">
                            + Añadir este servicio al cliente
                        </button>
                    </div>

                    <div id="listaTemporal" class="text-[11px] text-emerald-400 font-mono space-y-1"></div>

                    <input id="vencimiento" type="date" class="input-dark font-bold text-blue-400">
                    <button onclick="finalizarVenta()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl uppercase shadow-lg shadow-blue-900/20">
                        Guardar y Sincronizar Todo
                    </button>
                </div>
            </div>
        </div>

        <!-- TABLA -->
        <div class="lg:col-span-8">
            <div class="sidebar-card !p-0 overflow-hidden">
                <div class="p-4 bg-white/5 flex justify-between items-center">
                    <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="Buscar cliente o servicio..." class="bg-black/40 border border-slate-700 rounded-md px-3 py-2 text-xs w-64 outline-none">
                </div>
                <table class="w-full text-left">
                    <thead class="text-[10px] text-slate-500 uppercase bg-black/40 border-b border-slate-800">
                        <tr>
                            <th class="p-3">Cliente / Combos</th>
                            <th class="p-3 text-center">Días</th>
                            <th class="p-3 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla" class="divide-y divide-slate-800/50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "TU_URL_DE_APPS_SCRIPT"; 
        let servicioSeleccionado = "NETFLIX";
        let comboActual = [];
        let clientesGlobal = [];

        const servicios = ["NETFLIX", "MAX", "PRIME", "DISNEY+", "IPTV", "YOUTUBE", "SPOTIFY", "CANVA", "CAPCUT", "TELELATINO", "PARAMOUNT"];

        window.onload = () => {
            document.getElementById('gridServicios').innerHTML = servicios.map(s => `<button onclick="selServicio(this, '${s}')" class="btn-service ${s==='NETFLIX'?'active':''}">${s}</button>`).join('');
            cargarDatos();
        };

        function selServicio(btn, s) {
            document.querySelectorAll('.btn-service').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); 
            servicioSeleccionado = s;
        }

        function agregarAlCombo() {
            const correo = document.getElementById('correo').value;
            if(!correo) return alert("Llena los datos del servicio");
            
            comboActual.push({
                nombre: servicioSeleccionado,
                correo: correo,
                clave: document.getElementById('clave').value,
                perfil: document.getElementById('perfil').value
            });

            document.getElementById('listaTemporal').innerHTML = comboActual.map(item => `<div>✅ ${item.nombre} - ${item.correo}</div>`).join('');
            // Limpiar campos para el siguiente servicio del mismo cliente
            document.getElementById('correo').value = "";
            document.getElementById('clave').value = "";
            document.getElementById('perfil').value = "";
        }

        async function finalizarVenta() {
            if(comboActual.length === 0) return alert("Agrega al menos un servicio");
            
            // Unificamos todo para el Excel
            const data = {
                id: Date.now(),
                nombre: document.getElementById('nombre').value.toUpperCase(),
                telefono: document.getElementById('telefono').value,
                servicio: comboActual.map(s => s.nombre).join(" + "),
                correo: comboActual.map(s => s.correo).join(" | "),
                clave: comboActual.map(s => s.clave).join(" | "),
                vencimiento: document.getElementById('vencimiento').value
            };

            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function cargarDatos() {
            const r = await fetch(API_URL);
            clientesGlobal = await r.json();
            renderizarTabla();
        }

        function renderizarTabla() {
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            let html = "";
            clientesGlobal.forEach(c => {
                const [id, nom, tel, serv, costo, precio, mail, pass, perf, pin, vence] = c;
                let fVence = new Date(vence);
                let diff = Math.ceil((fVence.getTime() - hoy.getTime()) / 86400000);

                // MENSAJE ÚNICO CON TODOS LOS SERVICIOS
                let msgBase = `⭐ *PLANET STREAMING* ⭐\n\nHola *${nom}*, aquí tienes tus servicios:\n\n`;
                const listaServs = serv.split(" + ");
                const listaMails = mail.split(" | ");
                const listaPass = pass.split(" | ");

                listaServs.forEach((s, i) => {
                    msgBase += `📺 *${s}*\n👤 *User:* ${listaMails[i]}\n🔑 *Pass:* ${listaPass[i] || 'Same'}\n\n`;
                });
                msgBase += `🗓️ *Vencimiento:* ${fVence.toLocaleDateString()}`;

                const urlWA = `https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(msgBase)}`;

                html += `
                <tr class="hover:bg-white/5 transition-all text-[11px]">
                    <td class="p-3">
                        <div class="text-blue-400 font-bold">${nom}</div>
                        <div class="text-[9px] text-slate-500">${serv}</div>
                    </td>
                    <td class="p-3 text-center">
                        <span class="status-pill ${diff > 3 ? 'border-emerald-500 text-emerald-500' : 'border-red-500 text-red-500'}">
                            ${diff} DÍAS
                        </span>
                    </td>
                    <td class="p-3 text-center flex justify-center gap-1">
                        <a href="${urlWA}" target="_blank" class="action-btn bg-blue-600"><i class="fas fa-key"></i></a>
                        <button onclick="renovar('${id}')" class="action-btn bg-emerald-600"><i class="fas fa-sync"></i></button>
                    </td>
                </tr>`;
            });
            document.getElementById('cuerpoTabla').innerHTML = html;
        }

        async function renovar(id) {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'RENEW', id: id }) });
            location.reload();
        }
    </script>
</body>
</html>
