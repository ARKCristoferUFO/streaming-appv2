<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaming Planet | Sistema Operativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .tabla-scroll-container { overflow-x: auto; width: 100%; -webkit-overflow-scrolling: touch; }
        .tabla-fija { min-width: 1100px; width: 100%; }
        .btn-gestion { font-size: 9px; font-weight: 800; padding: 6px 12px; border-radius: 8px; text-transform: uppercase; white-space: nowrap; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .btn-gestion:hover { transform: translateY(-2px); filter: brightness(1.2); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-[1600px] mx-auto">
        
        <header class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
            <div class="glass p-4 rounded-3xl border-l-4 border-blue-500">
                <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest italic">Ventas Hoy</p>
                <p id="ventasBrutas" class="text-xl font-extrabold mt-1">$0.00</p>
            </div>
            <div class="glass p-4 rounded-3xl border-l-4 border-red-500 bg-red-500/5">
                <div class="flex justify-between items-center">
                    <p class="text-[9px] text-red-400 font-bold uppercase tracking-widest italic">Costo/Egresos</p>
                    <button onclick="registrarEgresoRapido()" class="bg-red-500 text-white p-1.5 rounded-lg hover:bg-red-400 shadow-lg"><i class="fas fa-plus text-[10px]"></i></button>
                </div>
                <p id="egresosHoy" class="text-xl font-extrabold mt-1">$0.00</p>
            </div>
            <div class="glass p-4 rounded-3xl border-l-4 border-emerald-500">
                <p class="text-[9px] text-emerald-400 font-bold uppercase tracking-widest italic">Caja Neta</p>
                <p id="cajaNeto" class="text-xl font-extrabold mt-1 text-emerald-400">$0.00</p>
            </div>
            <div class="glass p-4 rounded-3xl border-l-4 border-purple-500">
                <p class="text-[9px] text-purple-400 font-bold uppercase tracking-widest italic">Utilidad Mes</p>
                <p id="gananciaMes" class="text-xl font-extrabold mt-1">$0.00</p>
            </div>
            <div class="glass p-4 rounded-3xl border-l-4 border-yellow-500">
                <p class="text-[9px] text-yellow-500 font-bold uppercase tracking-widest italic">Balance Año</p>
                <p id="gananciaAnio" class="text-xl font-extrabold mt-1 text-yellow-500">$0.00</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-3">
                <div class="glass p-6 rounded-3xl shadow-2xl sticky top-6">
                    <h2 class="text-xs font-black text-blue-400 uppercase tracking-widest mb-4 italic">Nueva Venta</h2>
                    <div class="space-y-3">
                        <input id="nombre" type="text" placeholder="CLIENTE" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold uppercase outline-none focus:border-blue-500">
                        <input id="telefono" type="text" placeholder="TELÉFONO (Ej: 58412...)" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none">
                        <select id="servicio" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold uppercase outline-none">
                            <option value="NETFLIX">Netflix</option>
                            <option value="FLUJO TV">Flujo TV</option>
                            <option value="DISNEY+">Disney+</option>
                            <option value="MAX">Max</option>
                            <option value="PRIME VIDEO">Prime Video</option>
                            <option value="YOUTUBE">YouTube</option>
                        </select>
                        <div class="grid grid-cols-2 gap-2">
                            <input id="costo" type="number" step="0.01" placeholder="COSTO $" class="bg-slate-900 border border-red-900/30 rounded-xl p-3 text-xs text-red-400 outline-none">
                            <input id="precio" type="number" step="0.01" placeholder="VENTA $" class="bg-slate-900 border border-emerald-900/30 rounded-xl p-3 text-xs text-emerald-400 font-black outline-none">
                        </div>
                        <input id="vencimiento" type="date" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs font-bold text-white outline-none">
                        <button onclick="guardarEnGoogle()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 font-black py-4 rounded-xl shadow-lg uppercase text-[10px] tracking-widest transition-all">Registrar Ahora</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9">
                <div class="glass rounded-3xl shadow-2xl overflow-hidden">
                    <div class="p-4 bg-white/5 border-b border-white/5">
                        <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="🔍 Buscar registros..." class="w-full max-w-sm bg-slate-950 border border-slate-800 rounded-2xl px-4 py-2 text-xs outline-none focus:border-blue-500">
                    </div>
                    <div class="tabla-scroll-container">
                        <table class="tabla-fija text-left">
                            <thead class="bg-slate-950/50 text-slate-500 uppercase text-[9px] font-black tracking-widest">
                                <tr>
                                    <th class="p-5">Detalle / Cliente</th>
                                    <th class="p-5 text-center">Costo</th>
                                    <th class="p-5 text-center">Precio</th>
                                    <th class="p-5 text-center">Gestión Operativa</th>
                                    <th class="p-5 text-right">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoTabla" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec";
        let clientesGlobal = [];

        async function cargarDatos() {
            const res = await fetch(API_URL);
            clientesGlobal = await res.json();
            renderizarTabla();
        }

        // --- FUNCIONES DE LOS BOTONES ---
        function enviarWhatsapp(tel, msg) {
            if(!tel || tel == "0") return alert("No hay teléfono registrado");
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function copiarTexto(texto) {
            navigator.clipboard.writeText(texto);
            alert("¡Texto copiado al portapapeles! Listo para enviar.");
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            let vHoy = 0, cHoy = 0, uMes = 0, uAnio = 0;

            let html = "";
            clientesGlobal.forEach(c => {
                const fReg = new Date(parseInt(c[0]));
                const esEgreso = (c[1].toString().toUpperCase() === "EGRESO");
                const costoVal = parseFloat(c[4]) || 0; 
                const ventaVal = parseFloat(c[5]) || 0; 
                const clienteNombre = c[1];
                const servicioNombre = c[3];
                const telefono = c[2];

                if(!isNaN(fReg.getTime())) {
                    const esHoy = fReg.toDateString() === hoy.toDateString();
                    const esMes = fReg.getMonth() === hoy.getMonth() && fReg.getFullYear() === 2026;
                    if(esEgreso) {
                        if(esHoy) cHoy += ventaVal;
                        if(esMes) uMes -= ventaVal;
                        uAnio -= ventaVal;
                    } else {
                        if(esHoy) { vHoy += ventaVal; cHoy += costoVal; }
                        if(esMes) uMes += (ventaVal - costoVal);
                        uAnio += (ventaVal - costoVal);
                    }
                }

                if(esEgreso) {
                    html += `<tr class="bg-red-500/5 text-[11px]"><td class="p-5 font-black text-red-400 italic">GASTO EXTRA: ${servicioNombre}</td><td class="p-5 text-center">--</td><td class="p-5 text-center text-red-400 font-bold">-$${ventaVal.toFixed(2)}</td><td colspan="2"></td></tr>`;
                } else {
                    html += `<tr class="hover:bg-white/5 text-[11px]">
                        <td class="p-5"><p class="font-bold text-blue-400 uppercase">${clienteNombre}</p><p class="text-[9px] text-slate-500">${servicioNombre}</p></td>
                        <td class="p-5 text-center text-red-400/60 font-mono italic">$${costoVal.toFixed(2)}</td>
                        <td class="p-5 text-center text-emerald-400 font-black">$${ventaVal.toFixed(2)}</td>
                        <td class="p-5">
                            <div class="flex gap-2 justify-center">
                                <button onclick="copiarTexto('Hola ${clienteNombre}, aquí tienes tu cuenta de ${servicioNombre}. ¡Disfrútala!')" class="btn-gestion bg-blue-600 text-white"><i class="fas fa-paper-plane"></i> Entrega</button>
                                <button onclick="enviarWhatsapp('${telefono}', 'Hola ${clienteNombre}, tu servicio de ${servicioNombre} está próximo a vencer. ¿Deseas renovar?')" class="btn-gestion bg-purple-600 text-white"><i class="fas fa-sync-alt"></i> Renovar</button>
                                <button onclick="enviarWhatsapp('${telefono}', 'Hola ${clienteNombre}, te recordamos el pago pendiente de tu cuenta ${servicioNombre}. ¡Gracias!')" class="btn-gestion bg-emerald-600 text-white"><i class="fas fa-dollar-sign"></i> Cobro</button>
                                <button onclick="enviarWhatsapp('${telefono}', 'Hola!')" class="btn-gestion bg-slate-800 text-white"><i class="fab fa-whatsapp"></i> Chat</button>
                            </div>
                        </td>
                        <td class="p-5 text-right"><button onclick="eliminar('${c[0]}')" class="text-slate-800 hover:text-red-500"><i class="fas fa-trash-alt"></i></button></td>
                    </tr>`;
                }
            });
            tabla.innerHTML = html;
            document.getElementById('ventasBrutas').innerText = `$${vHoy.toFixed(2)}`;
            document.getElementById('egresosHoy').innerText = `$${cHoy.toFixed(2)}`;
            document.getElementById('cajaNeto').innerText = `$${(vHoy - cHoy).toFixed(2)}`;
            document.getElementById('gananciaMes').innerText = `$${uMes.toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${uAnio.toFixed(2)}`;
        }

        async function registrarEgresoRapido() {
            const m = prompt("Monto del gasto ($):");
            const mo = prompt("Motivo:");
            if(!m || isNaN(m) || !mo) return;
            const data = { id: Date.now(), nombre: "EGRESO", telefono: "0", servicio: mo.toUpperCase(), costo: 0, precio: parseFloat(m), vencimiento: new Date().toISOString().split('T')[0] };
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function guardarEnGoogle() {
            const data = { 
                id: Date.now(), 
                nombre: document.getElementById('nombre').value.toUpperCase().trim(), 
                telefono: document.getElementById('telefono').value.trim(), 
                servicio: document.getElementById('servicio').value, 
                costo: parseFloat(document.getElementById('costo').value) || 0, 
                precio: parseFloat(document.getElementById('precio').value) || 0, 
                vencimiento: document.getElementById('vencimiento').value 
            };
            if(!data.nombre || !data.vencimiento) return alert("Faltan datos");
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function eliminar(id) { if(confirm("¿Borrar?")) { await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) }); location.reload(); } }
        window.onload = cargarDatos;
    </script>
</body>
</html>
