<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Streaming Admin | v3.6 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b121f; --card: #161b2c; --border: #1e293b; --blue: #2563eb; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .sidebar-card { background: var(--card); border: 1px solid var(--border); border-radius: 1.2rem; padding: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4); }
        .input-dark { background: #0f172a; border: 1px solid var(--border); border-radius: 0.6rem; padding: 0.7rem; width: 100%; color: white; font-size: 12px; outline: none; transition: 0.2s; }
        .input-dark:focus { border-color: var(--blue); ring: 2px rgba(37, 99, 235, 0.3); }
        .grid-services { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.5rem; max-height: 200px; overflow-y: auto; padding: 5px; }
        .btn-service { background: #1e293b; border: 1px solid #334155; border-radius: 0.6rem; padding: 0.6rem; font-size: 9px; color: #94a3b8; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-service.active { background: var(--blue); color: white; border-color: #60a5fa; box-shadow: 0 0 15px rgba(37, 99, 235, 0.5); }
        .status-pill { border-radius: 20px; padding: 4px 10px; font-weight: 900; font-size: 9px; border: 1px solid; text-align: center; display: inline-block; min-width: 75px; text-transform: uppercase; }
        .status-green { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: #10b981; }
        .status-yellow { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border-color: #f59e0b; }
        .status-red { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: #ef4444; }
        .action-btn { border-radius: 6px; width: 32px; height: 32px; font-size: 10px; font-weight: 800; color: white; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; }
        .action-btn:hover { filter: brightness(1.2); transform: scale(1.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-6">

    <!-- ESTADÍSTICAS -->
    <div class="max-w-[1600px] mx-auto grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
        <div class="sidebar-card text-center border-t-2 border-slate-500/50 p-4"><p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest">Ventas Hoy</p><p id="gananciaDia" class="text-xl font-black">$0.00</p></div>
        <div class="sidebar-card text-center border-t-2 border-red-500/50 p-4"><p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest">Costos Hoy</p><p id="costoDia" class="text-xl font-black text-red-400">$0.00</p></div>
        <div class="sidebar-card text-center border-t-2 border-blue-500/50 p-4"><p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest">Neto Hoy</p><p id="netoDia" class="text-xl font-black text-blue-400">$0.00</p></div>
        <div class="sidebar-card text-center border-t-2 border-emerald-500/50 p-4"><p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest">Utilidad Mes</p><p id="gananciaMes" class="text-xl font-black text-emerald-400">$0.00</p></div>
        <div class="sidebar-card text-center border-t-2 border-yellow-500/50 p-4"><p class="text-slate-500 text-[9px] font-bold uppercase tracking-widest">Balance Anual</p><p id="gananciaAnio" class="text-xl font-black text-yellow-500">$0.00</p></div>
    </div>

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- FORMULARIO -->
        <div class="lg:col-span-3 space-y-4">
            <div class="sidebar-card">
                <h3 class="text-blue-400 font-black mb-5 text-xs uppercase flex items-center gap-2">
                    <i class="fas fa-plus-circle"></i> Nueva Operación
                </h3>
                <div class="space-y-3">
                    <input id="nombre" type="text" placeholder="CLIENTE" class="input-dark font-bold uppercase">
                    <input id="telefono" type="text" placeholder="WHATSAPP" class="input-dark">
                    
                    <div class="bg-black/20 p-2 rounded-xl border border-slate-800">
                        <p class="text-[9px] font-black text-slate-500 mb-2 uppercase italic ml-1">Plataforma:</p>
                        <div class="grid-services" id="gridServicios"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <input id="costo" type="number" step="0.01" placeholder="Costo $" class="input-dark text-center">
                        <input id="precio" type="number" step="0.01" placeholder="Venta $" class="input-dark text-center text-blue-300 font-bold">
                    </div>
                    <input id="correo" type="text" placeholder="Correo / Usuario" class="input-dark">
                    <input id="clave" type="text" placeholder="Contraseña" class="input-dark">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="perfil" type="text" placeholder="Perfil" class="input-dark">
                        <input id="pin" type="text" placeholder="PIN" class="input-dark">
                    </div>
                    
                    <button onclick="agregarAlCarrito()" class="w-full bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 font-black py-3 rounded-lg text-[10px] uppercase border border-blue-500/30 transition-all">
                        + Añadir al Carrito
                    </button>

                    <div id="listaCarrito" class="space-y-2 max-h-32 overflow-y-auto bg-black/40 p-2 rounded-lg border border-dashed border-slate-700 text-[10px]">
                        <p class="text-center text-slate-600 italic">No hay servicios</p>
                    </div>

                    <div class="pt-2">
                        <div class="flex justify-between items-center mb-2 px-1">
                            <span class="text-[10px] text-slate-500 font-bold uppercase">A cobrar:</span>
                            <span id="totalCarrito" class="text-emerald-400 font-black">$0.00</span>
                        </div>
                        <input id="vencimiento" type="date" class="input-dark font-bold mb-3 border-emerald-900/30">
                        <button onclick="finalizarVenta()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl uppercase text-xs shadow-lg shadow-blue-900/20 transition-all">
                            Finalizar Venta
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TABLA -->
        <div class="lg:col-span-9">
            <div class="sidebar-card !p-0 overflow-hidden">
                <div class="p-4 border-b border-slate-800 bg-white/5 flex flex-col md:flex-row gap-4 justify-between items-center">
                    <h2 class="font-black text-xs text-slate-400 uppercase tracking-widest">Base de Datos General</h2>
                    <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="🔍 Buscar por nombre, correo o servicio..." class="w-full md:w-96 bg-black/40 border border-slate-700 rounded-lg px-4 py-2 text-xs outline-none focus:border-blue-500">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[9px] text-slate-500 uppercase font-black bg-black/40 border-b border-slate-800">
                            <tr>
                                <th class="p-4">Cliente / Info</th>
                                <th class="p-4 text-center">Estado</th>
                                <th class="p-4 text-center">Vencimiento</th>
                                <th class="p-4 text-center">Acciones rápidas</th>
                                <th class="p-4"></th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla" class="divide-y divide-slate-800/30 text-[11px] font-medium uppercase"></tbody>
                    </table>
                </div>
                <div id="loader" class="p-20 text-center text-slate-600 font-black italic uppercase animate-pulse">
                    Conectando con el servidor...
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxRFID-dOQuNJcC2b74GmpYXJ9Do6w5U0yQy89IPy1Y805owu__Xce3yRI9eDBnVpjz/exec"; 

        let clientesGlobal = [];
        let carrito = [];
        let servicioActivo = "NETFLIX";

        const listaServicios = [
            "NETFLIX", "MAX", "PRIME VIDEO", "PARAMOUNT+", "DISNEY+", 
            "OLEADA TV", "IPTV", "YOUTUBE", "SPOTIFY", "CANVA PRO", 
            "CAPCUT PRO", "FLUJO TV", "VIKI", "CRUNCHYROLL", "DEEZER", "TELELATINO"
        ];

        window.onload = () => {
            const grid = document.getElementById('gridServicios');
            grid.innerHTML = listaServicios.map(s => `
                <button onclick="seleccionarServicio(this, '${s}')" class="btn-service ${s==='NETFLIX'?'active':''}">
                    ${s}
                </button>
            `).join('');
            cargarDatos();
        };

        function seleccionarServicio(btn, servicio) {
            document.querySelectorAll('.btn-service').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            servicioActivo = servicio;
        }

        function agregarAlCarrito() {
            const correo = document.getElementById('correo').value.trim();
            const clave = document.getElementById('clave').value.trim();
            if(!correo || !clave) return alert("⚠️ Correo y Clave son obligatorios.");

            const item = {
                servicio: servicioActivo,
                costo: parseFloat(document.getElementById('costo').value) || 0,
                precio: parseFloat(document.getElementById('precio').value) || 0,
                correo,
                clave,
                perfil: document.getElementById('perfil').value.trim() || "ÚNICO",
                pin: document.getElementById('pin').value.trim() || "N/A"
            };
            
            carrito.push(item);
            actualizarVistaCarrito();
            ["correo", "clave", "perfil", "pin", "costo", "precio"].forEach(id => document.getElementById(id).value = "");
        }

        function actualizarVistaCarrito() {
            const cont = document.getElementById('listaCarrito');
            const totalTxt = document.getElementById('totalCarrito');
            let total = 0;
            if(carrito.length === 0) {
                cont.innerHTML = '<p class="text-center text-slate-600 italic">No hay servicios</p>';
                totalTxt.innerText = "$0.00";
                return;
            }
            cont.innerHTML = carrito.map((it, idx) => {
                total += it.precio;
                return `<div class="flex justify-between items-center bg-black/40 p-2 px-3 rounded-lg border-l-2 border-blue-500">
                    <span class="font-bold">${it.servicio}</span>
                    <div class="flex gap-3 items-center">
                        <span class="text-blue-400 font-black">$${it.precio.toFixed(2)}</span>
                        <button onclick="eliminarDelCarrito(${idx})" class="text-red-500 hover:text-red-300"><i class="fas fa-times"></i></button>
                    </div>
                </div>`;
            }).join('');
            totalTxt.innerText = `$${total.toFixed(2)}`;
        }

        function eliminarDelCarrito(idx) {
            carrito.splice(idx, 1);
            actualizarVistaCarrito();
        }

        async function cargarDatos() {
            try {
                const r = await fetch(API_URL);
                const d = await r.json();
                clientesGlobal = Array.isArray(d) ? d : [];
                document.getElementById('loader').classList.add('hidden');
                renderizarTabla();
            } catch(e) { 
                console.error("Error:", e); 
                document.getElementById('loader').innerText = "❌ ERROR DE CONEXIÓN";
            }
        }

        function renderizarTabla() {
            const tabla = document.getElementById('cuerpoTabla');
            const buscar = document.getElementById('buscador').value.toLowerCase();
            const hoy = new Date(); hoy.setHours(0,0,0,0);

            let vDia = 0, cDia = 0, uMes = 0, uAnio = 0;
            let html = "";

            clientesGlobal.forEach(c => {
                const [id, nom, tel, serv, costoVal, ventaVal, vence, mail, pass, perf, pin] = c;
                
                // Formateo de fecha seguro
                let fVence = new Date(vence);
                if(isNaN(fVence.getTime())) {
                    // Intento de parseo manual si falla el nativo
                    const parts = vence.toString().split(/[-/T ]/);
                    if(parts.length >= 3) fVence = new Date(parts[0], parts[1]-1, parts[2]);
                }
                fVence.setHours(0,0,0,0);

                const costo = parseFloat(costoVal) || 0;
                const venta = parseFloat(ventaVal) || 0;
                const fReg = new Date(parseInt(id));

                // Estadísticas (Filtrar por año actual)
                if(!isNaN(fReg.getTime())) {
                    if(fReg.toDateString() === hoy.toDateString()) { vDia += venta; cDia += costo; }
                    if(fReg.getMonth() === hoy.getMonth() && fReg.getFullYear() === 2026) uMes += (venta - costo);
                    if(fReg.getFullYear() === 2026) uAnio += (venta - costo);
                }

                if(nom.toString().toLowerCase().includes(buscar) || serv.toString().toLowerCase().includes(buscar) || mail.toString().toLowerCase().includes(buscar)) {
                    
                    let diff = Math.ceil((fVence.getTime() - hoy.getTime()) / (1000 * 60 * 60 * 24));
                    let stClase = "status-red", stTexto = "VENCIDO";
                    if (!isNaN(diff)) {
                        stClase = diff < 0 ? "status-red" : (diff <= 3 ? "status-yellow" : "status-green");
                        stTexto = diff < 0 ? "VENCIDO" : (diff === 0 ? "HOY" : `${diff} DÍAS`);
                    }

                    const fechaShow = !isNaN(fVence.getTime()) ? fVence.toLocaleDateString('es-ES') : "---";
                    const wa = (msg) => `https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(msg)}`;
                    
                    const mAcceso = `⭐ *ACCESO ACTIVADO* ⭐\n\n📺 *SERVICIO:* ${serv}\n👤 *User:* ${mail}\n🔑 *Pass:* ${pass}\n👤 *Perfil:* ${perf}\n📌 *PIN:* ${pin}\n🗓️ *Vence:* ${fechaShow}\n\n🍿 Planet Streaming`;
                    const m3D = `Hola *${nom}* 🍿. Tu servicio *${serv}* vence en *3 días* (${fechaShow}).`;
                    const m0D = `🚨 *AVISO DE CORTE* - *${nom}*\n\nTu servicio *${serv}* vence *HOY*. Para renovar, contáctanos. 🍿`;

                    html += `
                    <tr class="hover:bg-white/5 transition-all">
                        <td class="p-4">
                            <div class="text-blue-400 font-black">${nom}</div>
                            <div class="text-[9px] text-slate-500 italic mt-0.5">${serv} • ${mail}</div>
                        </td>
                        <td class="p-4 text-center"><span class="status-pill ${stClase}">${stTexto}</span></td>
                        <td class="p-4 text-center font-mono text-slate-400 text-[10px]">${fechaShow}</td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-1.5">
                                <a href="${wa(mAcceso)}" target="_blank" class="action-btn bg-blue-600" title="Enviar Acceso"><i class="fas fa-key"></i></a>
                                <a href="${wa(m3D)}" target="_blank" class="action-btn bg-orange-500" title="Aviso 3 días">3D</a>
                                <a href="${wa(m0D)}" target="_blank" class="action-btn bg-red-600" title="Aviso Hoy">0D</a>
                                <button onclick="renovar('${id}')" class="action-btn bg-emerald-600" title="Renovar"><i class="fas fa-sync-alt"></i></button>
                            </div>
                        </td>
                        <td class="p-4 text-right">
                            <button onclick="eliminar('${id}')" class="text-slate-600 hover:text-red-500 transition-colors px-2">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>`;
                }
            });

            tabla.innerHTML = html || '<tr><td colspan="5" class="p-10 text-center text-slate-600">Sin registros</td></tr>';
            
            document.getElementById('gananciaDia').innerText = `$${vDia.toFixed(2)}`;
            document.getElementById('costoDia').innerText = `$${cDia.toFixed(2)}`;
            document.getElementById('netoDia').innerText = `$${(vDia - cDia).toFixed(2)}`;
            document.getElementById('gananciaMes').innerText = `$${uMes.toFixed(2)}`;
            document.getElementById('gananciaAnio').innerText = `$${uAnio.toFixed(2)}`;
        }

        async function finalizarVenta() {
            const nom = document.getElementById('nombre').value.toUpperCase().trim();
            const tel = document.getElementById('telefono').value.trim();
            const vence = document.getElementById('vencimiento').value;
            const btn = document.getElementById('btnGuardar');
            
            if(!nom || !vence || carrito.length === 0) return alert("⚠️ Completa Nombre, Fecha y añade servicios al carrito.");

            btn.disabled = true; 
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> PROCESANDO...';

            try {
                for (let i = 0; i < carrito.length; i++) {
                    const it = carrito[i];
                    const data = { 
                        id: Date.now() + i, 
                        nombre: nom, 
                        telefono: tel, 
                        servicio: it.servicio, 
                        costo: it.costo, 
                        precio: it.precio, 
                        vencimiento: vence, 
                        correo: it.correo, 
                        clave: it.clave, 
                        perfil: it.perfil, 
                        pin: it.pin 
                    };
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                }
                alert("✅ Venta registrada con éxito.");
                location.reload();
            } catch(e) {
                alert("Error al guardar. Revisa la consola.");
                btn.disabled = false;
                btn.innerText = "Finalizar Venta";
            }
        }

        async function renovar(id) {
            if(!confirm("¿Renovar por 30 días adicionales?")) return;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'RENEW', id: id }) });
            location.reload();
        }

        async function eliminar(id) {
            if(!confirm("¿Eliminar permanentemente?")) return;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) });
            location.reload();
        }
    </script>
</body>
</html>
