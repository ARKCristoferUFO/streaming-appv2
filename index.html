<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Streaming | Combo Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b121f; --card: #161b2c; --border: #1e293b; --accent: #2563eb; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Inter', sans-serif; font-size: 13px; }
        .sidebar-card { background: var(--card); border: 1px solid var(--border); border-radius: 1rem; padding: 1.2rem; }
        .input-dark { background: #0f172a; border: 1px solid var(--border); border-radius: 0.5rem; padding: 0.6rem; width: 100%; color: white; outline: none; border: 1px solid var(--border); transition: 0.2s; }
        .input-dark:focus { border-color: var(--accent); background: #1e293b; }
        .platform-btn { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 10px; font-weight: 800; color: #94a3b8; }
        .platform-btn.active { background: var(--accent); border-color: #60a5fa; color: white; transform: scale(1.05); box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .form-block { background: rgba(30, 41, 59, 0.5); border-left: 4px solid var(--accent); padding: 12px; margin-top: 8px; border-radius: 0 8px 8px 0; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .action-btn { width: 34px; height: 34px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: white; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body class="p-3 md:p-6">

    <div class="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- FORMULARIO DE VENTAS -->
        <div class="lg:col-span-4 space-y-4">
            <div class="sidebar-card shadow-2xl">
                <h2 class="text-blue-400 font-black text-xs mb-5 tracking-widest uppercase flex items-center gap-2">
                    <i class="fas fa-shopping-cart"></i> Generar Combo Multi-App
                </h2>
                
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="c_nombre" type="text" placeholder="NOMBRE CLIENTE" class="input-dark font-bold uppercase">
                        <input id="c_telefono" type="text" placeholder="WHATSAPP (+58...)" class="input-dark">
                    </div>

                    <div class="p-3 bg-black/20 rounded-xl border border-slate-800">
                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-3 text-center">Selecciona las plataformas:</p>
                        <div class="grid grid-cols-3 gap-2" id="selectorApps"></div>
                    </div>

                    <!-- CAMPOS DINÁMICOS -->
                    <div id="contenedorFormularios" class="space-y-3 max-h-[380px] overflow-y-auto pr-2 custom-scrollbar"></div>

                    <div class="pt-4 border-t border-slate-800">
                        <p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Fecha de Vencimiento:</p>
                        <input id="c_vence" type="date" class="input-dark mb-4 text-blue-400 font-bold">
                        <button onclick="guardarCombo()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl uppercase tracking-widest transition-all shadow-lg shadow-blue-900/40">
                            Registrar y Generar Mensaje
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PANEL DE CONTROL / TABLA -->
        <div class="lg:col-span-8">
            <div class="sidebar-card !p-0 overflow-hidden border-slate-800 shadow-xl">
                <div class="p-4 bg-white/5 border-b border-slate-800 flex justify-between items-center">
                    <div class="relative w-72">
                        <i class="fas fa-search absolute left-3 top-2.5 text-slate-500"></i>
                        <input id="bus" onkeyup="renderTabla()" type="text" placeholder="Buscar por cliente o app..." class="bg-black/40 border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-xs w-full outline-none focus:border-blue-500">
                    </div>
                    <div class="flex gap-4">
                        <div class="text-right">
                            <p class="text-[9px] text-slate-500 font-bold uppercase">Estado del Sistema</p>
                            <p class="text-[10px] text-emerald-400 font-black uppercase tracking-tighter">En línea / Planet Streaming</p>
                        </div>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-black/60 text-[10px] uppercase text-slate-500 font-black border-b border-slate-800">
                            <tr>
                                <th class="p-4">Cliente y Combos</th>
                                <th class="p-4 text-center">Estado / Días</th>
                                <th class="p-4 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla" class="divide-y divide-slate-800/50 text-[11px] uppercase font-medium"></tbody>
                    </table>
                </div>
                <div id="loader" class="p-20 text-center text-slate-600 animate-pulse">Cargando base de datos de Planet Streaming...</div>
            </div>
        </div>
    </div>

    <script>
        // REEMPLAZA ESTA URL POR TU URL DE GOOGLE APPS SCRIPT
        const API_URL = "TU_URL_DE_IMPLEMENTACION_AQUI";
        
        const APPS = ["NETFLIX", "MAX", "PRIME", "DISNEY+", "IPTV", "YOUTUBE", "SPOTIFY", "CANVA", "MAGISTV", "TELELATINO", "CAPCUT", "PARAMOUNT"];
        let seleccionadas = new Set();
        let datosGlobal = [];

        window.onload = () => {
            const selector = document.getElementById('selectorApps');
            selector.innerHTML = APPS.map(app => `<div onclick="toggleApp('${app}')" id="btn-${app}" class="platform-btn">${app}</div>`).join('');
            cargarDatos();
        };

        function toggleApp(app) {
            const btn = document.getElementById(`btn-${app}`);
            if (seleccionadas.has(app)) {
                seleccionadas.delete(app);
                btn.classList.remove('active');
                document.getElementById(`form-${app}`)?.remove();
            } else {
                seleccionadas.add(app);
                btn.classList.add('active');
                agregarCampos(app);
            }
        }

        function agregarCampos(app) {
            const div = document.createElement('div');
            div.id = `form-${app}`;
            div.className = 'form-block';
            div.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest"><i class="fas fa-tv mr-1"></i> ${app}</span>
                    <button onclick="toggleApp('${app}')" class="text-slate-600 hover:text-red-400"><i class="fas fa-times-circle"></i></button>
                </div>
                <input type="text" placeholder="Correo" data-app="${app}" class="f-mail input-dark mb-1.5 font-semibold">
                <div class="grid grid-cols-2 gap-1.5">
                    <input type="text" placeholder="Clave" data-app="${app}" class="f-pass input-dark">
                    <input type="text" placeholder="Perfil / PIN" data-app="${app}" class="f-perf input-dark">
                </div>
            `;
            document.getElementById('contenedorFormularios').appendChild(div);
        }

        async function guardarCombo() {
            const btn = document.getElementById('btnGuardar');
            const mails = Array.from(document.querySelectorAll('.f-mail')).map(i => i.value || 'N/A').join(' | ');
            const claves = Array.from(document.querySelectorAll('.f-pass')).map(i => i.value || 'N/A').join(' | ');
            const perfiles = Array.from(document.querySelectorAll('.f-perf')).map(i => i.value || 'N/A').join(' | ');

            const data = {
                id: Date.now(),
                nombre: document.getElementById('c_nombre').value.toUpperCase(),
                telefono: document.getElementById('c_telefono').value,
                servicios: Array.from(seleccionadas).join(' + '),
                correos: mails,
                claves: claves,
                perfiles: perfiles,
                pins: "N/A", // Simplificado para combos
                vencimiento: document.getElementById('c_vence').value
            };

            if(!data.nombre || seleccionadas.size === 0 || !data.vencimiento) {
                return alert("⚠️ Por favor completa el nombre, selecciona plataformas y pon la fecha de vencimiento.");
            }
            
            btn.innerHTML = "Guardando..."; btn.disabled = true;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            location.reload();
        }

        async function cargarDatos() {
            try {
                const res = await fetch(API_URL);
                datosGlobal = await res.json();
                document.getElementById('loader').classList.add('hidden');
                renderTabla();
            } catch(e) { console.error("Error cargando:", e); }
        }

        function renderTabla() {
            const tbody = document.getElementById('cuerpoTabla');
            const busq = document.getElementById('bus').value.toLowerCase();
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            let html = "";

            datosGlobal.forEach(c => {
                const [id, nom, tel, serv, , , mail, pass, perf, , vence] = c;
                if(!nom || (!nom.toLowerCase().includes(busq) && !serv.toLowerCase().includes(busq))) return;

                let fVence = new Date(vence);
                let diff = Math.ceil((fVence.getTime() - hoy.getTime()) / 86400000);
                let colorDias = diff > 3 ? 'text-emerald-400' : 'text-red-500';
                
                // CONSTRUIR MENSAJE UNIFICADO PARA WHATSAPP
                let msg = `⭐ *PLANET STREAMING* ⭐\n\nHola *${nom}*, aquí tienes tus accesos de hoy:\n\n`;
                const s_list = serv.split(' + ');
                const m_list = mail.split(' | ');
                const k_list = pass.split(' | ');
                const p_list = perf.split(' | ');

                s_list.forEach((s, i) => {
                    msg += `📺 *SERVICIO:* ${s}\n👤 *Correo:* ${m_list[i]}\n🔑 *Clave:* ${k_list[i]}\n👤 *Perfil/PIN:* ${p_list[i]}\n\n`;
                });
                msg += `🗓️ *Vencimiento:* ${fVence.toLocaleDateString()}\n\n¡Gracias por preferir Planet Streaming! 🚀`;

                const urlWA = `https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(msg)}`;

                html += `
                <tr class="hover:bg-white/5 transition-all">
                    <td class="p-4">
                        <div class="text-blue-400 font-black text-sm">${nom}</div>
                        <div class="text-[9px] text-slate-500 font-bold mt-1"><i class="fas fa-layer-group"></i> ${serv}</div>
                    </td>
                    <td class="p-4 text-center">
                        <div class="font-black ${colorDias}">${diff} DÍAS</div>
                        <div class="text-[9px] text-slate-500">${fVence.toLocaleDateString()}</div>
                    </td>
                    <td class="p-4 text-center">
                        <div class="flex justify-center gap-2">
                            <a href="${urlWA}" target="_blank" class="action-btn bg-blue-600" title="Enviar Todo por WhatsApp"><i class="fab fa-whatsapp"></i></a>
                            <button onclick="renovar('${id}')" class="action-btn bg-emerald-600" title="Renovar +30 Días"><i class="fas fa-sync-alt"></i></button>
                            <button onclick="eliminar('${id}')" class="action-btn bg-red-600/20 text-red-500 border border-red-900/50" title="Eliminar"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html || '<tr><td colspan="3" class="p-10 text-center text-slate-500">No se encontraron clientes</td></tr>';
        }

        async function renovar(id) {
            if(!confirm("¿Deseas renovar este combo completo por 30 días adicionales?")) return;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'RENEW', id: id }) });
            location.reload();
        }

        async function eliminar(id) {
            if(!confirm("¿Estás seguro de eliminar este cliente?")) return;
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id: id }) });
            location.reload();
        }
    </script>
</body>
</html>
