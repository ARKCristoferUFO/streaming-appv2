<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Streaming Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-stats { background-color: #161b2c; border: 1px solid #1e293b; border-radius: 1rem; }
        .sidebar-card { background-color: #161b2c; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #1e293b; }
        .input-dark { background-color: #0b0f1a; border: 1px solid #1e293b; border-radius: 0.5rem; padding: 0.6rem; width: 100%; color: white; outline: none; font-size: 11px; }
        .grid-services { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; max-height: 180px; overflow-y: auto; padding-right: 4px; }
        .btn-service { background-color: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.4rem; font-size: 9px; color: #94a3b8; font-weight: bold; text-align: center; cursor: pointer; }
        .btn-service.active { background-color: #2563eb; border-color: #3b82f6; color: white; box-shadow: 0 0 8px rgba(37, 99, 235, 0.4); }
        .status-pill { border-radius: 9999px; padding: 0.2rem 0.6rem; font-weight: 800; font-size: 9px; border: 2px solid; min-width: 75px; display: inline-block; text-align: center; }
        .status-green { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: #10b981; }
        .status-yellow { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border-color: #f59e0b; }
        .status-red { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: #ef4444; }
        .action-btn { border-radius: 0.4rem; padding: 0.4rem 0.6rem; font-size: 9px; font-weight: 800; text-transform: uppercase; color: white; display: inline-flex; align-items: center; justify-content: center; min-width: 45px; }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-[1600px] mx-auto">
        <!-- DASHBOARD ACTUALIZADO -->
        <div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
            <div class="card-stats p-4 text-center border-b-4 border-white/10">
                <p class="text-slate-500 text-[9px] font-bold uppercase mb-1">Ventas Hoy</p>
                <p id="gananciaDia" class="text-xl font-black text-white">$0.00</p>
            </div>
            <div class="card-stats p-4 text-center border-b-4 border-red-500/30">
                <p class="text-slate-500 text-[9px] font-bold uppercase mb-1">Costo Hoy</p>
                <p id="costoDia" class="text-xl font-black text-red-500">$0.00</p>
            </div>
            <div class="card-stats p-4 text-center border-b-4 border-blue-500/30">
                <p class="text-slate-500 text-[9px] font-bold uppercase mb-1">Neto Hoy</p>
                <p id="netoDia" class="text-xl font-black text-blue-400">$0.00</p>
            </div>
            <div class="card-stats p-4 text-center border-b-4 border-emerald-500/30">
                <p class="text-slate-500 text-[9px] font-bold uppercase mb-1">Mes (Utilidad)</p>
                <p id="gananciaMes" class="text-xl font-black text-emerald-400">$0.00</p>
            </div>
            <div class="card-stats p-4 text-center border-b-4 border-yellow-500/30">
                <p class="text-slate-500 text-[9px] font-bold uppercase mb-1">Año (Utilidad)</p>
                <p id="gananciaAnio" class="text-xl font-black text-yellow-500">$0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- COLUMNA IZQUIERDA: CARRITO -->
            <div class="lg:col-span-3">
                <div class="sidebar-card">
                    <h2 class="text-blue-500 font-black italic mb-4 text-[11px] uppercase tracking-wider">Registrar Combo / Venta</h2>
                    <div class="space-y-3">
                        <input id="nombre" type="text" placeholder="NOMBRE CLIENTE" class="input-dark font-bold uppercase">
                        <input id="telefono" type="text" placeholder="WHATSAPP (Ej: 58412...)" class="input-dark">
                        
                        <div>
                            <p class="text-[9px] font-bold text-slate-500 mb-2 uppercase italic">1. Seleccionar Servicio:</p>
                            <div class="grid-services" id="gridServicios"></div>
                        </div>

                        <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-800 space-y-2">
                            <div class="grid grid-cols-2 gap-2">
                                <input id="costo" type="number" step="0.1" placeholder="Inversión $" class="input-dark text-center">
                                <input id="precio" type="number" step="0.1" placeholder="Venta $" class="input-dark text-center text-blue-400 font-bold">
                            </div>
                            <input id="correo" type="text" placeholder="Usuario / Correo" class="input-dark">
                            <input id="clave" type="text" placeholder="Contraseña" class="input-dark">
                            <div class="grid grid-cols-2 gap-2">
                                <input id="perfil" type="text" placeholder="Perfil" class="input-dark">
                                <input id="pin" type="text" placeholder="PIN" class="input-dark">
                            </div>
                            <button onclick="agregarAlCarrito()" class="w-full bg-blue-600/10 hover:bg-blue-600/30 text-blue-400 font-bold py-2 rounded text-[9px] uppercase border border-blue-500/20 transition-all">
                                + Añadir al Carrito
                            </button>
                        </div>

                        <!-- VISTA PREVIA CARRITO -->
                        <div id="listaCarrito" class="space-y-1 max-h-32 overflow-y-auto bg-black/20 p-2 rounded border border-dashed border-slate-800">
                            <p class="text-center text-slate-600 text-[9px] italic">Carrito vacío</p>
                        </div>

                        <div class="pt-2">
                            <div class="flex justify-between text-[11px] font-black mb-3 px-1">
                                <span>TOTAL A COBRAR:</span>
                                <span id="totalCarrito" class="text-emerald-400">$0.00</span>
                            </div>
                            <input id="vencimiento" type="date" class="input-dark font-bold mb-3">
                            <button onclick="finalizarVenta()" id="btnGuardar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl uppercase text-[11px] shadow-xl transition-all">
                                Finalizar y Entregar
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- COLUMNA DERECHA: TABLA -->
            <div class="lg:col-span-9">
                <div class="bg-[#161b2c] rounded-2xl border border-slate-800 shadow-2xl overflow-hidden">
                    <div class="p-4 border-b border-slate-800">
                        <input id="buscador" onkeyup="renderizarTabla()" type="text" placeholder="Buscar por nombre o plataforma..." class="w-full bg-[#0b0f1a] border border-slate-800 rounded-xl px-4 py-2 text-xs outline-none focus:border-blue-500 transition-all">
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-[10px]">
                            <thead>
                                <tr class="text-slate-500 uppercase font-bold border-b border-slate-800/50">
                                    <th class="p-4 text-left">Cliente / Servicio</th>
                                    <th class="p-4 text-center">Estado</th>
                                    <th class="p-4 text-center">Vence</th>
                                    <th class="p-4 text-center">Acciones</th>
                                    <th class="p-4"></th>
                                </tr>
                            </thead>
                            <tbody id="cuerpoTabla" class="font-bold uppercase divide-y divide-slate-800/20">
                                <!-- Datos dinámicos -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
